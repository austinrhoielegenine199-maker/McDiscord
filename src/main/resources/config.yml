# DiscordHookSRV Configuration
# Made By ArchiveAustin

# Discord bot token - Get from Discord Developer Portal
# CRITICAL: Never share your real token
bot-token: "PASTE_YOUR_BOT_TOKEN_HERE"

# Minecraft server IP for !ip command
server-ip: "your.server.ip"

# Discord role ID to give linked players
# Get the role ID by enabling developer mode in Discord and right-clicking the role
linked-role-id: "DISCORD_ROLE_ID"

# Link code expiration time in minutes
link-code-expiration-minutes: 5

# Nickname synchronization settings
nickname-sync:
  enabled: true
  reset-on-unlink: true

# Rank/group synchronization using LuckPerms
rank-sync:
  enabled: true
  groups:
    default: "DISCORD_ROLE_ID"
    vip: "DISCORD_ROLE_ID"
    moderator: "DISCORD_ROLE_ID"
    admin: "DISCORD_ROLE_ID"

# !ip command configuration
ip:
  enabled: true
  command: "!ip"
  embed:
    title: "Minecraft Server"
    description: "Join us at {ip}"
    color: "#5865F2"
    thumbnail: ""
    image: ""
    footer: "DiscordHookSRV - Made By ArchiveAustin"
    fields: []

# !online command configuration
online:
  enabled: true
  command: "!online"
  embed:
    title: "Server Status"
    description: "Status: {status}"
    color: "#57F287"
    thumbnail: ""
    image: ""
    footer: "DiscordHookSRV - Made By ArchiveAustin"
    fields:
      - name: "Players"
        value: "{online}/{max}"
        inline: true
      - name: "Online Players"
        value: "{players}"
        inline: false

# Minecraft command messages
messages:
  link-success: "&aYour Minecraft account has been linked successfully!"
  link-invalid: "&cThat linking code is invalid or expired."
  already-linked: "&cThis account is already linked."
  unlink-success: "&aYour account has been unlinked."
  link-usage: "&cUsage: /link <code>"
  reload-success: "&a&lDiscordHookSRV reloaded successfully!"
  reload-failed: "&c&lFailed to reload DiscordHookSRV!"

# Discord messages
discord:
  link-success-dm: "Your Minecraft account \"{username}\" has been successfully linked to Discord."
  unlink-success-dm: "Your Minecraft account has been unlinked from Discord."

# Debug mode
debug: false
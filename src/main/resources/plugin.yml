name: DiscordHookSRV
version: 1.0.0
description: Minecraft ↔ Discord integration plugin
main: com.mcdiscord.discordhooksrv.DiscordHookSRV
api-version: 1.20

authors:
  - ArchiveAustin

commands:
  link:
    description: Link your Minecraft account to Discord
    usage: /link [code]
    aliases:
      - linkdiscord
      - discordlink
  unlink:
    description: Unlink your Minecraft account from Discord
    usage: /unlink
  mcdiscord:
    description: Main plugin command
    usage: /mcdiscord reload
    aliases:
      - dhs

permissions:
  discordhooksrv.link:
    description: Allows player to link their Discord account
    default: true
  discordhooksrv.unlink:
    description: Allows player to unlink their Discord account
    default: true
  discordhooksrv.admin:
    description: Allows admin commands
    default: op
  discordhooksrv.reload:
    description: Allows reloading plugin config
    default: op